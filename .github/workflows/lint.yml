name: Lint

on:
  push:
    branches-ignore:
      - 'dependabot/**'
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
      - run: npm i
      - run: npm run lint
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v6
      with:
        node-version: 26
    - run: npm i
    - run: npm t -- --allow-incomplete-coverage
